<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Web Application</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jost:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>
    <section>
        <header>
            <img src="images/logo.png" alt="" class="logo">
            <div class="time">
                <img src="images/watch.png" alt="">
                <span class="timer">00</span>
            </div>
        </header>

        <div class="start-screen">
            <img src="images/welcome-person.png" alt="" class="welcome-person">
            <h1>Welcome To Quizo</h1>
            <p>Click on the button bellow to start the test.</p>
            <button class="start">Start</button>
        </div>

        <div class="container quiz-screen">
                <div class="col">
                    <h1 class="question">What kind of services you are quiz?</h1>
                    <div class="question-number">
                        Question <span class="currentNumber">1</span> to <span class="totalNumber">5</span>
                    </div>
                    <ul class="answer-box">
                        <li class="choose">
                            <input type="radio" checked>
                            Well organized and Easy
                        </li>
                        <li>
                            <input type="radio">
                            Transitions are Shown lorem
                        </li>
                        <li>
                            <input type="radio">
                            Generate a nice Color
                        </li>
                        <li>
                            <input type="radio">
                            Transition Between Two
                        </li>
                    </ul>
                    <div class="navigation-buttons">
                        <button class="prev">Back</button>
                        <button class="next">Next</button>
                    </div>
                </div>
        </div>

        <div class="result-screen">
            <div class="result-circle">
                <span>4</span>/ <span>5</span>
            </div>
            <h2>Your Score</h2>
            <p class="success-msg">Congratulation! Greate Job!</p>
            <button class="restart">Restart</button>
        </div>
    </section>

    <script src="main.js"></script>
</body>
</html>
